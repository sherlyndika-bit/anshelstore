<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Akun Saya — Anshel Store</title>
<meta name="robots" content="noindex"/>
<link rel="icon" href="/logo.png?v=4" type="image/png"/>
<link rel="apple-touch-icon" href="/icon-192.png?v=4"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#e11d48','primary-hover':'#be123c',background:'#f8fafc',surface:'#ffffff'}}}}</script>
<script src="/js/theme.js?v=2.0"></script>
<link href="/css/theme.css?v=2.0" rel="stylesheet"/>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NXRVTQKMZF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-NXRVTQKMZF');
</script>
</head>
<body data-page="akun" class="bg-background text-gray-800 font-sans min-h-screen overflow-x-hidden">
<div id="siteNav"></div>

<main class="max-w-5xl mx-auto px-4 md:px-8 py-10 md:py-16">
  <!-- Header profil -->
  <div class="bg-surface rounded-xl shadow-sm border border-gray-100 p-6 md:p-8 flex flex-col sm:flex-row items-center gap-6 mb-8 text-center sm:text-left">
    <div id="avatar" class="w-24 h-24 rounded-full bg-primary text-white flex items-center justify-center text-4xl font-bold shrink-0">a</div>
    <div class="flex-1 min-w-0">
      <h1 id="uName" class="text-2xl font-bold text-gray-900 mb-1">Memuat…</h1>
      <p id="uEmail" class="text-gray-500 mb-2"></p>
      <span id="uRole" class="inline-block text-xs font-semibold bg-gray-100 text-gray-700 px-3 py-1 rounded-full border border-gray-200"></span>
    </div>
    <button id="logoutBtn" class="bg-white border border-gray-200 hover:bg-red-50 hover:text-primary hover:border-red-100 text-gray-700 font-medium px-5 py-2.5 rounded-xl transition-colors inline-flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      Keluar
    </button>
  </div>

  <!-- Statistik ringkas -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
    <div class="bg-surface rounded-xl border border-gray-100 p-6 text-center shadow-sm"><div id="statTotal" class="text-3xl font-bold text-gray-900 mb-1">0</div><div class="text-sm text-gray-500">Total Pesanan</div></div>
    <div class="bg-surface rounded-xl border border-gray-100 p-6 text-center shadow-sm"><div id="statDone" class="text-3xl font-bold text-green-600 mb-1">0</div><div class="text-sm text-gray-500">Selesai</div></div>
    <div class="bg-surface rounded-xl border border-gray-100 p-6 text-center shadow-sm"><div id="statSpend" class="text-3xl font-bold text-primary mb-1">Rp0</div><div class="text-sm text-gray-500">Total Belanja</div></div>
  </div>

  <!-- Pangkat & Achievement -->
  <div id="tierSection" class="bg-surface rounded-xl border border-gray-100 shadow-sm p-6 md:p-8 mb-8 hidden">
    <div class="flex flex-col sm:flex-row items-center gap-6 mb-6">
      <div id="tierBadge" class="w-20 h-20 rounded-2xl flex items-center justify-center text-4xl font-extrabold shadow-lg"></div>
      <div class="text-center sm:text-left flex-1">
        <div class="text-sm text-gray-500 mb-1">Pangkat Kamu</div>
        <h2 id="tierName" class="text-3xl font-extrabold text-gray-900"></h2>
        <div id="tierProgress" class="mt-2"></div>
      </div>
    </div>
    <h3 class="text-lg font-bold text-gray-900 mb-4 border-t border-gray-100 pt-6">Achievement</h3>
    <div id="achievementGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Edit profil -->
    <div class="bg-surface rounded-xl border border-gray-100 shadow-sm p-6 md:p-8">
      <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">Edit Profil</h2>
      <div class="flex flex-col gap-5">
        <label class="block"><span class="text-sm font-medium text-gray-700">Nama</span><input id="pfName" type="text" class="mt-2 w-full rounded-xl border-gray-300 shadow-sm focus:border-primary focus:ring-primary"/></label>
        <label class="block"><span class="text-sm font-medium text-gray-700">No. WhatsApp</span><input id="pfPhone" type="text" placeholder="08xxxxxxxxxx" class="mt-2 w-full rounded-xl border-gray-300 shadow-sm focus:border-primary focus:ring-primary"/></label>
        <label class="block"><span class="text-sm font-medium text-gray-700">Bio (opsional)</span><textarea id="pfBio" rows="3" maxlength="200" placeholder="Ceritakan sedikit tentang kamu…" class="mt-2 w-full rounded-xl border-gray-300 shadow-sm focus:border-primary focus:ring-primary"></textarea></label>
        <div class="block">
          <span class="text-sm font-medium text-gray-700">Foto Profil</span>
          <div class="flex items-center gap-4 mt-3">
            <span id="pfPicPreview" class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center overflow-hidden shrink-0 text-gray-400">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </span>
            <button type="button" id="pfUpload" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium px-4 py-2 rounded-xl transition-colors">Upload Foto</button>
            <button type="button" id="pfPicClear" class="text-sm text-gray-500 hover:text-primary transition-colors">Hapus</button>
          </div>
          <input id="pfPicture" type="hidden"/>
        </div>
        <button id="saveProfile" class="mt-2 bg-primary hover:bg-primary-hover text-white font-semibold px-6 py-3 rounded-xl transition-colors self-start">Simpan Profil</button>
        <span id="pfMsg" class="text-sm"></span>
      </div>
    </div>

    <!-- Keamanan -->
    <div class="bg-surface rounded-xl border border-gray-100 shadow-sm p-6 md:p-8">
      <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4">Keamanan</h2>
      <div id="pwBox" class="flex flex-col gap-5">
        <label class="block"><span class="text-sm font-medium text-gray-700">Password Lama</span><input id="pwOld" type="password" class="mt-2 w-full rounded-xl border-gray-300 shadow-sm focus:border-primary focus:ring-primary"/></label>
        <label class="block"><span class="text-sm font-medium text-gray-700">Password Baru</span><input id="pwNew" type="password" placeholder="Minimal 6 karakter" class="mt-2 w-full rounded-xl border-gray-300 shadow-sm focus:border-primary focus:ring-primary"/></label>
        <button id="savePassword" class="mt-2 bg-gray-900 hover:bg-gray-800 text-white font-semibold px-6 py-3 rounded-xl transition-colors self-start">Ubah Password</button>
        <span id="pwMsg" class="text-sm"></span>
      </div>
    </div>
  </div>

  <!-- Riwayat pesanan -->
  <div class="flex items-center justify-between mt-12 mb-6">
    <h2 class="text-2xl font-bold text-gray-900">Riwayat Pesanan</h2>
    <a href="/topup" class="text-primary hover:text-primary-hover font-medium transition-colors flex items-center gap-1">Top Up lagi <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg></a>
  </div>
  <div id="orders" class="flex flex-col gap-4"></div>
</main>

<div id="siteFooter"></div>
<script src="/js/site.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const rupiah = (n) => "Rp" + Number(n).toLocaleString("id-ID");
  const token = localStorage.getItem("anshel_token");
  const BADGE = { pending: "bg-orange-100 text-orange-800 border-orange-200", paid: "bg-blue-100 text-blue-800 border-blue-200", processing: "bg-blue-100 text-blue-800 border-blue-200", done: "bg-green-100 text-green-800 border-green-200", cancelled: "bg-red-100 text-red-800 border-red-200" };
  if (!token) { location.replace("/masuk?next=/akun"); }
  const H = { "x-auth-token": token, "Content-Type": "application/json" };

  async function load() {
    const me = await fetch("/api/auth/me", { headers: H });
    if (!me.ok) { localStorage.removeItem("anshel_token"); return location.replace("/masuk?next=/akun"); }
    const { user } = await me.json();
    $("uName").textContent = user.name || "Pengguna";
    $("uEmail").textContent = user.email;
    $("uRole").textContent = user.admin ? "Admin" : "Member";
    $("pfName").value = user.name || "";
    $("pfPhone").value = user.phone || "";
    $("pfBio").value = user.bio || "";
    setPfPic(user.picture || "");
    if (user.picture) $("avatar").innerHTML = `<img src="${user.picture}" class="w-24 h-24 rounded-full object-cover"/>`;
    else $("avatar").textContent = (user.name || user.email || "a").charAt(0).toUpperCase();
    if (user.provider === "google") { $("pwBox").innerHTML = '<p class="text-gray-500">Kamu masuk lewat Google, jadi password dikelola oleh akun Google-mu.</p>'; }

    const orders = await fetch("/api/my/orders", { headers: H }).then(r => r.json());
    $("statTotal").textContent = orders.length;
    $("statDone").textContent = orders.filter(o => o.status === "done").length;
    $("statSpend").textContent = rupiah(orders.filter(o => o.status !== "cancelled").reduce((s, o) => s + (o.price || 0), 0));
    const box = $("orders");
    if (!orders.length) { box.innerHTML = `<div class="bg-surface rounded-xl border border-gray-100 p-10 text-center text-gray-500 shadow-sm"><div class="text-4xl mb-3">🎮</div>Belum ada pesanan. <a href="/topup" class="text-primary hover:text-primary-hover font-medium">Top Up sekarang &rarr;</a></div>`; return; }
    box.innerHTML = orders.map(o => `
      <a href="/cek-transaksi?code=${o.code}" class="bg-surface rounded-xl border border-gray-100 p-5 shadow-sm hover:shadow-md hover:border-gray-200 transition-all flex items-center justify-between gap-4">
        <div><div class="font-semibold text-gray-900">${o.gameName} &middot; ${o.itemLabel}</div>
        <div class="text-sm text-gray-500 mt-1">${o.code} &bull; ${new Date(o.createdAt).toLocaleDateString("id-ID")}</div></div>
        <div class="text-right"><div class="font-bold text-gray-900 mb-1">${rupiah(o.price)}</div>
        <span class="text-xs font-medium px-2.5 py-1 rounded-md border ${BADGE[o.status] || ""}">${o.status}</span></div>
      </a>`).join("");

    // Load tier & achievements
    try {
      const ps = await fetch("/api/my/profile-stats", { headers: H }).then(r => r.json());
      const tierSec = $("tierSection");
      if (tierSec) {
        tierSec.classList.remove("hidden");
        const tierColors = { Newbie: "from-slate-400 to-slate-500", Bronze: "from-orange-400 to-orange-600", Silver: "from-gray-300 to-gray-500", Gold: "from-amber-400 to-yellow-500", Platinum: "from-violet-400 to-purple-600", Diamond: "from-cyan-300 to-blue-500" };
        const tierIcons = { Newbie: "🌱", Bronze: "🥉", Silver: "🥈", Gold: "🥇", Platinum: "💠", Diamond: "💎" };
        $("tierBadge").className = `w-20 h-20 rounded-2xl flex items-center justify-center text-4xl font-extrabold shadow-lg bg-gradient-to-br ${tierColors[ps.tier] || tierColors.Newbie} text-white`;
        $("tierBadge").textContent = tierIcons[ps.tier] || "🌱";
        $("tierName").textContent = ps.tier;
        if (ps.nextTier) {
          $("tierProgress").innerHTML = `<div class="flex items-center gap-2"><div class="flex-1 bg-gray-200 rounded-full h-2.5"><div class="h-2.5 rounded-full bg-gradient-to-r ${tierColors[ps.tier]}" style="width:${ps.progress}%"></div></div><span class="text-xs text-gray-500 whitespace-nowrap">${ps.doneCount}/${ps.nextTierMin} → ${ps.nextTier}</span></div>`;
        } else {
          $("tierProgress").innerHTML = `<span class="text-sm text-gray-500">Tier tertinggi tercapai! 🎉</span>`;
        }
        $("achievementGrid").innerHTML = ps.achievements.map(a => `
          <div class="rounded-xl border p-4 text-center transition-all ${a.unlocked ? 'bg-white border-amber-200 shadow-md' : 'bg-gray-50 border-gray-100 opacity-50 grayscale'}">
            <div class="text-3xl mb-2">${a.icon}</div>
            <div class="font-bold text-sm text-gray-900">${a.name}</div>
            <div class="text-xs text-gray-500 mt-1">${a.desc}</div>
            ${a.unlocked ? '<div class="text-xs text-amber-600 font-bold mt-2">✅ Tercapai</div>' : '<div class="text-xs text-gray-400 mt-2">🔒 Terkunci</div>'}
          </div>
        `).join("");
      }
    } catch(e) {}
  }

  function setPfPic(url) {
    $("pfPicture").value = url || "";
    const p = $("pfPicPreview");
    p.innerHTML = url ? `<img src="${url}" class="w-16 h-16 object-cover"/>` : '<svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>';
  }
  $("pfUpload").addEventListener("click", () => {
    const inp = document.createElement("input"); inp.type = "file"; inp.accept = "image/*";
    inp.onchange = () => {
      const f = inp.files && inp.files[0]; if (!f) return;
      if (f.size > 4 * 1024 * 1024) { alert("Foto terlalu besar (maks 4MB)."); return; }
      const r = new FileReader();
      r.onload = async () => {
        try { const res = await fetch("/api/upload", { method: "POST", headers: H, body: JSON.stringify({ dataUrl: r.result }) }); const d = await res.json(); if (!res.ok) throw new Error(d.error || "gagal"); setPfPic(d.url); }
        catch (e) { alert("Upload gagal: " + (e.message || "coba lagi")); }
      };
      r.readAsDataURL(f);
    };
    inp.click();
  });
  $("pfPicClear").addEventListener("click", () => setPfPic(""));

  $("saveProfile").addEventListener("click", async () => {
    const m = $("pfMsg"); m.textContent = "Menyimpan…"; m.className = "text-sm text-gray-500 mt-2 block";
    try {
      const r = await fetch("/api/auth/profile", { method: "PUT", headers: H, body: JSON.stringify({ name: $("pfName").value, phone: $("pfPhone").value, bio: $("pfBio").value, picture: $("pfPicture").value }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || "gagal");
      m.textContent = "Profil tersimpan! ✅"; m.className = "text-sm text-green-600 font-bold mt-2 block";
      $("uName").textContent = d.user.name; if (d.user.picture) $("avatar").innerHTML = `<img src="${d.user.picture}" class="w-24 h-24 rounded-full object-cover"/>`;
    } catch (e) { m.textContent = "Gagal menyimpan."; m.className = "text-sm text-red-600 mt-2 block"; }
  });

  $("savePassword").addEventListener("click", async () => {
    const m = $("pwMsg"); m.className = "text-sm mt-2 block"; m.textContent = "Menyimpan...";
    try {
      const r = await fetch("/api/auth/change-password", { method: "POST", headers: H, body: JSON.stringify({ oldPassword: $("pwOld").value, newPassword: $("pwNew").value }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || "gagal");
      m.textContent = "Password berhasil diubah! ✅"; m.className = "text-sm text-green-600 font-bold mt-2 block"; $("pwOld").value = ""; $("pwNew").value = "";
    } catch (e) { m.textContent = e.message; m.className = "text-sm text-red-600 mt-2 block"; }
  });

  $("logoutBtn").addEventListener("click", async () => { try { await fetch("/api/auth/logout", { method: "POST", headers: H }); } catch (e) {} localStorage.removeItem("anshel_token"); location.replace("/"); });
  if (token) load();
</script>
</body>
</html>
