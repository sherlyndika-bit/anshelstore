<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Akun Saya — Anshel Store</title>
<meta name="robots" content="noindex"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="/js/theme.js"></script>
<link href="/css/theme.css" rel="stylesheet"/>
</head>
<body data-page="akun" class="bg-ambient text-on-background font-body-md min-h-screen overflow-x-hidden">
<div id="siteNav"></div>

<main class="max-w-4xl mx-auto px-margin-mobile md:px-margin-desktop py-xl">
  <div id="profileCard" class="bg-surface-container-lowest rounded-lg shadow-md shadow-primary/10 p-md md:p-lg flex items-center gap-md mb-md reveal in">
    <div id="avatar" class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-secondary text-on-primary flex items-center justify-center text-[28px] font-extrabold">a</div>
    <div class="flex-1">
      <h1 id="uName" class="font-headline-md text-headline-md text-on-surface">Memuat…</h1>
      <p id="uEmail" class="font-body-md text-body-md text-on-surface-variant"></p>
    </div>
    <button id="logoutBtn" class="bg-surface-container hover:bg-error-container hover:text-on-error-container text-on-surface-variant font-label-md text-label-md px-md py-sm rounded-full transition-colors">Keluar</button>
  </div>

  <div class="flex items-center justify-between mb-sm">
    <h2 class="font-headline-md text-headline-md text-on-surface">Riwayat Pesanan</h2>
    <a href="/topup" class="font-label-md text-label-md text-primary hover:scale-105 transition-transform inline-flex items-center gap-xs">Top Up lagi <span class="material-symbols-outlined text-[18px]">add</span></a>
  </div>
  <div id="orders" class="flex flex-col gap-sm"></div>
</main>

<div id="siteFooter"></div>
<script src="/js/site.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const rupiah = (n) => "Rp" + Number(n).toLocaleString("id-ID");
  const token = localStorage.getItem("anshel_token");
  const BADGE = { pending: "bg-tertiary-fixed text-on-tertiary-fixed-variant", paid: "bg-primary-fixed text-on-primary-fixed-variant", processing: "bg-secondary-fixed text-on-secondary-fixed-variant", done: "bg-primary-fixed text-primary", cancelled: "bg-error-container text-on-error-container" };
  if (!token) { location.replace("/masuk?next=/akun"); }

  async function load() {
    const me = await fetch("/api/auth/me", { headers: { "x-auth-token": token } });
    if (!me.ok) { localStorage.removeItem("anshel_token"); return location.replace("/masuk?next=/akun"); }
    const { user } = await me.json();
    $("uName").textContent = user.name || "Pengguna";
    $("uEmail").textContent = user.email;
    if (user.picture) $("avatar").innerHTML = `<img src="${user.picture}" class="w-16 h-16 rounded-full object-cover"/>`;
    else $("avatar").textContent = (user.name || user.email || "a").charAt(0).toUpperCase();

    const orders = await fetch("/api/my/orders", { headers: { "x-auth-token": token } }).then(r => r.json());
    const box = $("orders");
    if (!orders.length) { box.innerHTML = `<div class="bg-surface-container-lowest rounded-lg p-lg text-center text-on-surface-variant shadow-sm"><div class="text-[40px] mb-sm">🎮</div>Belum ada pesanan. <a href="/topup" class="text-primary font-bold">Top Up sekarang →</a></div>`; return; }
    box.innerHTML = orders.map(o => `
      <a href="/cek-transaksi?code=${o.code}" class="bg-surface-container-lowest rounded-lg p-md shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all flex items-center justify-between gap-sm">
        <div>
          <div class="font-label-md text-label-md text-on-surface font-bold">${o.gameName} · ${o.itemLabel}</div>
          <div class="font-label-sm text-label-sm text-on-surface-variant">${o.code} • ${new Date(o.createdAt).toLocaleDateString("id-ID")}</div>
        </div>
        <div class="text-right">
          <div class="font-label-md text-label-md text-secondary font-bold">${rupiah(o.price)}</div>
          <span class="font-label-sm text-label-sm px-sm py-[2px] rounded-full ${BADGE[o.status] || ""}">${o.status}</span>
        </div>
      </a>`).join("");
  }
  $("logoutBtn").addEventListener("click", async () => { try { await fetch("/api/auth/logout", { method: "POST", headers: { "x-auth-token": token } }); } catch (e) {} localStorage.removeItem("anshel_token"); location.replace("/"); });
  if (token) load();
</script>
</body>
</html>
