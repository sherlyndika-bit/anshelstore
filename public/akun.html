<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Akun Saya — Anshel Store</title>
<meta name="robots" content="noindex"/>
<meta name="theme-color" content="#6c5ce7"/>
<link href="/css/styles.css?v=4.0" rel="stylesheet"/>
<link href="/css/theme.css?v=4.0" rel="stylesheet"/>
<script src="/js/theme.js?v=4.0"></script>
</head>
<body data-page="akun" class="min-h-screen">
<div id="siteNav"></div>

<main class="container" style="padding:32px 16px 80px">
  <!-- Header profil -->
  <div class="card" style="display:flex;flex-wrap:wrap;align-items:center;gap:20px;margin-bottom:20px;padding:24px 28px">
    <div id="avatar" class="brand-logo shrink-0" style="width:72px;height:72px;border-radius:50%;font-size:32px">a</div>
    <div class="flex-1" style="min-width:0">
      <h1 id="uName">Memuat…</h1>
      <p id="uEmail" class="text-sub"></p>
      <span id="uRole" class="badge badge-processing" style="margin-top:4px"></span>
    </div>
    <button id="logoutBtn" class="btn btn-ghost btn-sm">
      <span class="material-symbols-outlined" style="font-size:18px">logout</span> Keluar
    </button>
  </div>

  <!-- Statistik ringkas -->
  <div class="grid grid-3" style="margin-bottom:20px">
    <div class="card text-center">
      <div id="statTotal" class="mono text-primary" style="font-size:1.6rem;font-weight:800">0</div>
      <div class="text-muted" style="font-size:0.82rem">Total Pesanan</div>
    </div>
    <div class="card text-center">
      <div id="statDone" class="mono" style="font-size:1.6rem;font-weight:800;color:var(--secondary)">0</div>
      <div class="text-muted" style="font-size:0.82rem">Selesai</div>
    </div>
    <div class="card text-center">
      <div id="statSpend" class="mono" style="font-size:1.6rem;font-weight:800">Rp0</div>
      <div class="text-muted" style="font-size:0.82rem">Total Belanja</div>
    </div>
  </div>

  <div class="grid grid-2">
    <!-- Edit profil -->
    <div class="card">
      <h2 style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
        <span class="material-symbols-outlined text-primary">badge</span> Edit Profil
      </h2>
      <div class="flex-col gap-sm">
        <label class="block">
          <span class="text-sub" style="font-size:0.88rem;font-weight:600">Nama</span>
          <input id="pfName" type="text" class="input" style="margin-top:4px"/>
        </label>
        <label class="block">
          <span class="text-sub" style="font-size:0.88rem;font-weight:600">No. WhatsApp</span>
          <input id="pfPhone" type="text" placeholder="08xxxxxxxxxx" class="input" style="margin-top:4px"/>
        </label>
        <label class="block">
          <span class="text-sub" style="font-size:0.88rem;font-weight:600">Bio (opsional)</span>
          <textarea id="pfBio" rows="2" maxlength="200" placeholder="Ceritakan sedikit tentang kamu…" class="input" style="margin-top:4px"></textarea>
        </label>
        <div class="block">
          <span class="text-sub" style="font-size:0.88rem;font-weight:600">Foto Profil</span>
          <div style="display:flex;align-items:center;gap:12px;margin-top:6px">
            <span id="pfPicPreview" style="width:52px;height:52px;border-radius:50%;background:var(--surface-alt);display:grid;place-items:center;overflow:hidden;flex-shrink:0;color:var(--text-muted)"><span class="material-symbols-outlined">person</span></span>
            <button type="button" id="pfUpload" class="btn btn-outline btn-sm">
              <span class="material-symbols-outlined" style="font-size:18px">photo_camera</span> Upload Foto
            </button>
            <button type="button" id="pfPicClear" class="text-muted" style="font-size:0.82rem;background:none;border:none;cursor:pointer">Hapus</button>
          </div>
          <input id="pfPicture" type="hidden"/>
        </div>
        <button id="saveProfile" class="btn btn-primary btn-sm" style="align-self:flex-start">
          <span class="material-symbols-outlined" style="font-size:18px">save</span> Simpan Profil
        </button>
        <span id="pfMsg" style="font-size:0.82rem"></span>
      </div>
    </div>

    <!-- Keamanan -->
    <div class="card">
      <h2 style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
        <span class="material-symbols-outlined text-primary">lock</span> Keamanan
      </h2>
      <div id="pwBox" class="flex-col gap-sm">
        <label class="block">
          <span class="text-sub" style="font-size:0.88rem;font-weight:600">Password Lama</span>
          <input id="pwOld" type="password" class="input" style="margin-top:4px"/>
        </label>
        <label class="block">
          <span class="text-sub" style="font-size:0.88rem;font-weight:600">Password Baru</span>
          <input id="pwNew" type="password" placeholder="Minimal 6 karakter" class="input" style="margin-top:4px"/>
        </label>
        <button id="savePassword" class="btn btn-outline btn-sm" style="align-self:flex-start">
          <span class="material-symbols-outlined" style="font-size:18px">key</span> Ubah Password
        </button>
        <span id="pwMsg" style="font-size:0.82rem"></span>
      </div>
    </div>
  </div>

  <!-- Riwayat pesanan -->
  <div class="flex-between" style="margin-top:40px;margin-bottom:12px">
    <h2>Riwayat Pesanan</h2>
    <a href="/topup" class="btn btn-ghost btn-sm">Top Up lagi <span class="material-symbols-outlined" style="font-size:18px">add</span></a>
  </div>
  <div id="orders" class="flex-col gap-sm"></div>
</main>

<div id="siteFooter"></div>
<script src="/js/site.js?v=4.0"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const rupiah = (n) => "Rp" + Number(n).toLocaleString("id-ID");
  const token = localStorage.getItem("anshel_token");
  const BADGE = { pending: "badge badge-pending", paid: "badge badge-paid", processing: "badge badge-processing", done: "badge badge-done", cancelled: "badge badge-cancelled" };
  if (!token) { location.replace("/masuk?next=/akun"); }
  const H = { "x-auth-token": token, "Content-Type": "application/json" };

  async function load() {
    const me = await fetch("/api/auth/me", { headers: H });
    if (!me.ok) { localStorage.removeItem("anshel_token"); return location.replace("/masuk?next=/akun"); }
    const { user } = await me.json();
    $("uName").textContent = user.name || "Pengguna";
    $("uEmail").textContent = user.email;
    $("uRole").textContent = user.admin ? "Admin" : "Member";
    $("pfName").value = user.name || "";
    $("pfPhone").value = user.phone || "";
    $("pfBio").value = user.bio || "";
    setPfPic(user.picture || "");
    if (user.picture) $("avatar").innerHTML = `<img src="${user.picture}" style="width:72px;height:72px;border-radius:50%;object-fit:cover"/>`;
    else $("avatar").textContent = (user.name || user.email || "a").charAt(0).toUpperCase();
    if (user.provider === "google") { $("pwBox").innerHTML = '<p class="text-sub">Kamu masuk lewat Google, jadi password dikelola oleh akun Google-mu.</p>'; }

    const orders = await fetch("/api/my/orders", { headers: H }).then(r => r.json());
    $("statTotal").textContent = orders.length;
    $("statDone").textContent = orders.filter(o => o.status === "done").length;
    $("statSpend").textContent = rupiah(orders.filter(o => o.status !== "cancelled").reduce((s, o) => s + (o.price || 0), 0));
    const box = $("orders");
    if (!orders.length) { box.innerHTML = `<div class="card text-center" style="padding:32px"><div style="font-size:40px;margin-bottom:12px">🎮</div>Belum ada pesanan. <a href="/topup" class="text-primary" style="font-weight:700">Top Up sekarang →</a></div>`; return; }
    box.innerHTML = orders.map(o => `
      <a href="/cek-transaksi?code=${o.code}" class="card hover-lift" style="display:flex;align-items:center;justify-content:space-between;gap:12px;text-decoration:none">
        <div><div style="font-weight:700">${o.gameName} · ${o.itemLabel}</div>
        <div class="text-muted" style="font-size:0.82rem">${o.code} • ${new Date(o.createdAt).toLocaleDateString("id-ID")}</div></div>
        <div class="text-right"><div style="font-weight:700;color:var(--secondary)">${rupiah(o.price)}</div>
        <span class="${BADGE[o.status] || "badge"}">${o.status}</span></div>
      </a>`).join("");
  }

  function setPfPic(url) {
    $("pfPicture").value = url || "";
    const p = $("pfPicPreview");
    p.innerHTML = url ? `<img src="${url}" style="width:52px;height:52px;object-fit:cover"/>` : '<span class="material-symbols-outlined">person</span>';
  }
  $("pfUpload").addEventListener("click", () => {
    const inp = document.createElement("input"); inp.type = "file"; inp.accept = "image/*";
    inp.onchange = () => {
      const f = inp.files && inp.files[0]; if (!f) return;
      if (f.size > 4 * 1024 * 1024) { alert("Foto terlalu besar (maks 4MB)."); return; }
      const r = new FileReader();
      r.onload = async () => {
        try { const res = await fetch("/api/upload", { method: "POST", headers: H, body: JSON.stringify({ dataUrl: r.result }) }); const d = await res.json(); if (!res.ok) throw new Error(d.error || "gagal"); setPfPic(d.url); }
        catch (e) { alert("Upload gagal: " + (e.message || "coba lagi")); }
      };
      r.readAsDataURL(f);
    };
    inp.click();
  });
  $("pfPicClear").addEventListener("click", () => setPfPic(""));

  $("saveProfile").addEventListener("click", async () => {
    const m = $("pfMsg"); m.textContent = "Menyimpan…"; m.style.color = "var(--text-muted)";
    try {
      const r = await fetch("/api/auth/profile", { method: "PUT", headers: H, body: JSON.stringify({ name: $("pfName").value, phone: $("pfPhone").value, bio: $("pfBio").value, picture: $("pfPicture").value }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || "gagal");
      m.textContent = "Profil tersimpan! ✅"; m.style.color = "var(--green)"; m.style.fontWeight = "700";
      $("uName").textContent = d.user.name; if (d.user.picture) $("avatar").innerHTML = `<img src="${d.user.picture}" style="width:72px;height:72px;border-radius:50%;object-fit:cover"/>`;
    } catch (e) { m.textContent = "Gagal menyimpan."; m.style.color = "var(--red)"; }
  });

  $("savePassword").addEventListener("click", async () => {
    const m = $("pwMsg");
    try {
      const r = await fetch("/api/auth/change-password", { method: "POST", headers: H, body: JSON.stringify({ oldPassword: $("pwOld").value, newPassword: $("pwNew").value }) });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || "gagal");
      m.textContent = "Password berhasil diubah! ✅"; m.style.color = "var(--green)"; m.style.fontWeight = "700"; $("pwOld").value = ""; $("pwNew").value = "";
    } catch (e) { m.textContent = e.message; m.style.color = "var(--red)"; }
  });

  $("logoutBtn").addEventListener("click", async () => { try { await fetch("/api/auth/logout", { method: "POST", headers: H }); } catch (e) {} localStorage.removeItem("anshel_token"); location.replace("/"); });
  if (token) load();
</script>
</body>
</html>
