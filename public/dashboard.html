<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — anshelstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body class="dash">

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <form class="login-card" id="loginForm">
      <a class="brand"><span class="brand-logo">a</span> anshelstore</a>
      <h1>Dashboard Admin</h1>
      <p>Masuk untuk mengelola pesanan & percakapan</p>
      <div class="field"><label>Password</label><input class="input" id="pw" type="password" placeholder="Masukkan password admin" autocomplete="current-password" /></div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">Masuk</button>
      <div class="login-err" id="loginErr"></div>
      <p style="margin-top:14px;font-size:.8rem">Default password: <b>admin123</b> (ubah lewat env <code>ADMIN_PASSWORD</code>)</p>
    </form>
  </div>

  <!-- APP SHELL -->
  <div class="shell" id="shell" style="display:none">
    <div class="sidebar-backdrop" id="backdrop"></div>
    <aside class="sidebar" id="sidebar">
      <a href="/" class="brand"><span class="brand-logo">a</span> anshelstore</a>
      <nav class="side-nav">
        <button data-page="overview" class="active">📊 Overview</button>
        <button data-page="orders">🎮 Pesanan <span class="count" id="ordersCount" style="display:none"></span></button>
        <button data-page="inbox">💬 Inbox Chat <span class="count" id="inboxCount" style="display:none"></span></button>
      </nav>
      <div class="side-foot">
        <button id="logoutBtn">↩︎ Keluar</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-btn" id="menuBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg></button>
          <h1 id="pageTitle">Overview</h1>
        </div>
        <div class="user"><span class="avatar">A</span><span style="font-weight:600;font-size:.92rem">Admin</span></div>
      </header>

      <div class="content">
        <!-- OVERVIEW -->
        <section class="page active" id="page-overview">
          <div class="stats-grid" id="statsGrid"></div>
          <div class="two-col">
            <div class="panel-card">
              <h3>Pesanan 7 Hari Terakhir</h3>
              <div class="bars" id="barsChart"></div>
            </div>
            <div class="panel-card">
              <h3>Game Terlaris</h3>
              <div class="toplist" id="topGames"></div>
            </div>
          </div>
          <div class="panel-card" style="margin-top:16px">
            <h3>Pesanan Terbaru</h3>
            <div class="table-wrap"><table class="data" id="recentOrders"></table></div>
          </div>
        </section>

        <!-- ORDERS -->
        <section class="page" id="page-orders">
          <div class="filters" id="orderFilters">
            <button class="filter-chip active" data-f="all">Semua</button>
            <button class="filter-chip" data-f="pending">Pending</button>
            <button class="filter-chip" data-f="paid">Paid</button>
            <button class="filter-chip" data-f="processing">Processing</button>
            <button class="filter-chip" data-f="done">Done</button>
            <button class="filter-chip" data-f="cancelled">Cancelled</button>
          </div>
          <div class="panel-card">
            <div class="table-wrap"><table class="data" id="ordersTable"></table></div>
          </div>
        </section>

        <!-- INBOX -->
        <section class="page" id="page-inbox">
          <div class="inbox">
            <div class="conv-list" id="convList"></div>
            <div class="chat-pane" id="chatPane">
              <div class="chat-empty" id="chatEmpty">Pilih percakapan di sebelah kiri untuk mulai membantu pelanggan.</div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
