<main class="max-w-xl mx-auto px-4 md:px-8 py-12">

  </div>

  <div class="bg-surface rounded-2xl p-6 md:p-8 shadow-xl border border-gray-100">
    <div class="flex flex-col sm:flex-row gap-3">
      <input id="codeInput" type="text" placeholder="Contoh: INV12345678" class="flex-1 rounded-xl border-gray-300 bg-white focus:border-primary focus:ring-primary uppercase shadow-sm py-3"/>
      <button id="checkBtn" class="bg-primary hover:bg-primary-hover text-white font-bold px-8 py-3 rounded-xl shadow-md hover:shadow-lg transition-all">Lacak</button>
    </div>
    <div id="result" class="mt-6"></div>
  </div>

  <p class="text-center text-sm text-gray-500 mt-8">Belum punya pesanan? <a href="/topup" class="text-primary hover:text-primary-hover font-bold transition-colors">Top Up sekarang &rarr;</a></p>
</main>

<div id="siteFooter"></div>
<div id="chatWidget"></div>
<script src="/js/widget.js"></script>
<script src="/js/site.js"></script>
<script>
  const rupiah = (n) => "Rp" + Number(n).toLocaleString("id-ID");
  const STEPS = ["pending", "paid", "processing", "done"];
  const LABEL = { pending: "Menunggu Pembayaran", paid: "Pembayaran Diterima", processing: "Diproses", done: "Selesai", cancelled: "Dibatalkan" };
  const BADGE = { pending: "bg-orange-50 text-orange-700 border border-orange-200", paid: "bg-blue-50 text-blue-700 border border-blue-200", processing: "bg-blue-50 text-blue-700 border border-blue-200", done: "bg-green-50 text-green-700 border border-green-200", cancelled: "bg-red-50 text-red-700 border border-red-200" };
  const $ = (id) => document.getElementById(id);

  async function check() {
    const code = $("codeInput").value.trim().toUpperCase();
    const box = $("result");
    if (!code) { box.innerHTML = ""; return; }
    box.innerHTML = '<p class="text-center text-gray-500 py-4 font-medium">Mencari…</p>';
    try {
      const res = await fetch("/api/track?code=" + encodeURIComponent(code));
      if (!res.ok) { box.innerHTML = '<div class="rounded-xl bg-red-50 text-red-600 border border-red-100 p-4 text-center text-sm font-medium">Pesanan tidak ditemukan. Periksa kembali kode invoicemu.</div>'; return; }
      const o = await res.json();
      const acc = Object.entries(o.account || {}).map(([k, v]) => `<div class="flex justify-between py-1"><span>${k}</span><b class="text-gray-900">${v}</b></div>`).join("");
      const cancelled = o.status === "cancelled";
      const timeline = cancelled ? "" : `<div class="flex items-center justify-between my-6">${STEPS.map((s, i) => {
        const done = STEPS.indexOf(o.status) >= i;
        return `<div class="flex flex-col items-center flex-1"><div class="w-8 h-8 rounded-full flex items-center justify-center ${done ? "bg-primary text-white" : "bg-gray-100 text-gray-400"}"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${done ? 'M5 13l4 4L19 7' : 'M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0-18 0'}"></path></svg></div><span class="text-xs font-medium text-gray-500 mt-2 text-center">${LABEL[s]}</span></div>${i < STEPS.length - 1 ? `<div class="h-[2px] flex-1 ${STEPS.indexOf(o.status) > i ? "bg-primary" : "bg-gray-200"} -mx-2 z-[-1] mt-[-20px]"></div>` : ""}`;
      }).join("")}</div>`;
      box.innerHTML = `
        <div class="rounded-xl border border-gray-200 p-5 mt-4 bg-gray-50/50 shadow-sm">
          <div class="flex justify-between items-center mb-4"><b class="text-gray-900 font-bold text-lg">${o.code}</b><span class="text-xs font-semibold px-3 py-1 rounded-full ${BADGE[o.status] || ""}">${LABEL[o.status] || o.status}</span></div>
          ${timeline}
          <div class="flex flex-col gap-2 text-sm text-gray-500 mt-6 border-t border-gray-200 pt-5">
            <div class="flex justify-between py-1"><span>Game</span><b class="text-gray-900">${o.gameName}</b></div>
            <div class="flex justify-between py-1"><span>Item</span><b class="text-gray-900">${o.itemLabel}</b></div>
            ${acc}
            <div class="flex justify-between py-1"><span>Metode</span><b class="text-gray-900">${o.paymentMethod || "-"}</b></div>
            <div class="flex justify-between py-1 mt-2 border-t border-gray-200 pt-3"><span>Total</span><b class="text-primary text-base">${rupiah(o.price)}</b></div>
            <div class="flex justify-between py-1"><span>Tanggal</span><b class="text-gray-900">${new Date(o.createdAt).toLocaleString("id-ID")}</b></div>
          </div>
        </div>`;
    } catch (e) { box.innerHTML = '<div class="rounded-xl bg-red-50 text-red-600 border border-red-100 p-4 text-center text-sm font-medium">Gagal terhubung. Coba lagi.</div>'; }
  }
  $("checkBtn").addEventListener("click", check);
  $("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") check(); });
  const pre = new URLSearchParams(location.search).get("code");
  if (pre) { $("codeInput").value = pre; check(); }
  if (typeof initChatWidget === "function") initChatWidget();
</script>
