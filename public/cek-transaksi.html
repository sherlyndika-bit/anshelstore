<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cek Transaksi — anshelstore</title>
<meta name="description" content="Lacak status pesanan top up game kamu di anshelstore dengan kode invoice." />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="/js/theme.js"></script>
<link href="/css/theme.css" rel="stylesheet"/>
</head>
<body data-page="cek" class="bg-ambient text-on-background font-body-md min-h-screen overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">

<div id="siteNav"></div>

<main class="max-w-xl mx-auto px-margin-mobile md:px-margin-desktop py-xl">
  <div class="text-center mb-lg">
    <div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mx-auto mb-sm"><span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings:'FILL' 1;">receipt_long</span></div>
    <h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-xs">Cek <span class="bg-gradient-to-r from-primary to-secondary text-gradient">Transaksi</span></h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant">Masukkan kode invoice untuk melihat status pesananmu.</p>
  </div>

  <div class="bg-surface-container-lowest rounded-lg p-md md:p-lg shadow-md shadow-primary/10">
    <div class="flex flex-col sm:flex-row gap-sm">
      <input id="codeInput" type="text" placeholder="Contoh: INV12345678" class="flex-1 rounded-DEFAULT border-outline-variant bg-surface focus:border-primary focus:ring-primary uppercase"/>
      <button id="checkBtn" class="bg-gradient-to-r from-primary to-secondary text-on-primary font-label-md text-label-md px-gutter py-sm rounded-full hover:scale-105 active:scale-95 transition-all">Lacak</button>
    </div>
    <div id="result" class="mt-md"></div>
  </div>

  <p class="text-center font-body-md text-body-md text-on-surface-variant mt-md">Belum punya pesanan? <a href="/topup.html" class="text-primary font-bold">Top Up sekarang →</a></p>
</main>

<div id="siteFooter"></div>
<div id="chatWidget"></div>
<script src="/js/widget.js"></script>
<script src="/js/site.js"></script>
<script>
  const rupiah = (n) => "Rp" + Number(n).toLocaleString("id-ID");
  const STEPS = ["pending", "paid", "processing", "done"];
  const LABEL = { pending: "Menunggu Pembayaran", paid: "Pembayaran Diterima", processing: "Diproses", done: "Selesai", cancelled: "Dibatalkan" };
  const BADGE = { pending: "bg-tertiary-fixed text-on-tertiary-fixed-variant", paid: "bg-primary-fixed text-on-primary-fixed-variant", processing: "bg-secondary-fixed text-on-secondary-fixed-variant", done: "bg-primary-fixed text-primary", cancelled: "bg-error-container text-on-error-container" };
  const $ = (id) => document.getElementById(id);

  async function check() {
    const code = $("codeInput").value.trim().toUpperCase();
    const box = $("result");
    if (!code) { box.innerHTML = ""; return; }
    box.innerHTML = '<p class="text-center text-on-surface-variant py-sm">Mencari…</p>';
    try {
      const res = await fetch("/api/track?code=" + encodeURIComponent(code));
      if (!res.ok) { box.innerHTML = '<div class="rounded-DEFAULT bg-error-container/50 text-on-error-container p-md text-center font-label-md text-label-md">Pesanan tidak ditemukan. Periksa kembali kode invoicemu.</div>'; return; }
      const o = await res.json();
      const acc = Object.entries(o.account || {}).map(([k, v]) => `<div class="flex justify-between"><span>${k}</span><b class="text-on-surface">${v}</b></div>`).join("");
      const cancelled = o.status === "cancelled";
      const timeline = cancelled ? "" : `<div class="flex items-center justify-between my-md">${STEPS.map((s, i) => {
        const done = STEPS.indexOf(o.status) >= i;
        return `<div class="flex flex-col items-center flex-1"><div class="w-8 h-8 rounded-full flex items-center justify-center ${done ? "bg-gradient-to-r from-primary to-secondary text-on-primary" : "bg-surface-container text-on-surface-variant"}"><span class="material-symbols-outlined text-[18px]">${done ? "check" : "radio_button_unchecked"}</span></div><span class="font-label-sm text-label-sm text-on-surface-variant mt-xs text-center">${LABEL[s]}</span></div>${i < STEPS.length - 1 ? `<div class="h-[2px] flex-1 ${STEPS.indexOf(o.status) > i ? "bg-primary" : "bg-surface-container"}"></div>` : ""}`;
      }).join("")}</div>`;
      box.innerHTML = `
        <div class="rounded-DEFAULT border border-outline-variant/40 p-md mt-sm">
          <div class="flex justify-between items-center mb-sm"><b class="text-on-surface">${o.code}</b><span class="font-label-sm text-label-sm px-sm py-[2px] rounded-full ${BADGE[o.status] || ""}">${LABEL[o.status] || o.status}</span></div>
          ${timeline}
          <div class="flex flex-col gap-xs font-body-md text-body-md text-on-surface-variant">
            <div class="flex justify-between"><span>Game</span><b class="text-on-surface">${o.gameName}</b></div>
            <div class="flex justify-between"><span>Item</span><b class="text-on-surface">${o.itemLabel}</b></div>
            ${acc}
            <div class="flex justify-between"><span>Metode</span><b class="text-on-surface">${o.paymentMethod || "-"}</b></div>
            <div class="flex justify-between"><span>Total</span><b class="text-secondary">${rupiah(o.price)}</b></div>
            <div class="flex justify-between"><span>Tanggal</span><b class="text-on-surface">${new Date(o.createdAt).toLocaleString("id-ID")}</b></div>
          </div>
        </div>`;
    } catch (e) { box.innerHTML = '<div class="rounded-DEFAULT bg-error-container/50 text-on-error-container p-md text-center">Gagal terhubung. Coba lagi.</div>'; }
  }
  $("checkBtn").addEventListener("click", check);
  $("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") check(); });
  const pre = new URLSearchParams(location.search).get("code");
  if (pre) { $("codeInput").value = pre; check(); }
  if (typeof initChatWidget === "function") initChatWidget();
</script>
</body>
</html>
