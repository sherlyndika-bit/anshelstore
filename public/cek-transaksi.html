<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cek Transaksi — Anshel Store</title>
<meta name="description" content="Lacak status pesanan top up game kamu di Anshel Store dengan kode invoice." />
<meta name="theme-color" content="#6c5ce7"/>
<link href="/css/styles.css?v=3.0" rel="stylesheet"/>
<link href="/css/theme.css?v=3.0" rel="stylesheet"/>
<script src="/js/theme.js?v=3.0"></script>
</head>
<body data-page="cek" class="min-h-screen">

<div id="siteNav"></div>

<main class="container-sm" style="padding:48px 16px 80px">
  <div class="text-center" style="margin-bottom:32px">
    <div class="card-icon" style="width:64px;height:64px;border-radius:50%;margin:0 auto 16px">
      <span class="material-symbols-outlined" style="font-size:32px">receipt_long</span>
    </div>
    <h1 style="font-size:clamp(2rem,4vw,2.8rem)">Cek <span class="text-gradient">Transaksi</span></h1>
    <p class="text-sub" style="margin-top:6px">Masukkan kode invoice untuk melihat status pesananmu.</p>
  </div>

  <div class="card" style="padding:24px">
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <input id="codeInput" type="text" placeholder="Contoh: INV12345678" class="input flex-1" style="text-transform:uppercase"/>
      <button id="checkBtn" class="btn btn-primary shrink-0">Lacak</button>
    </div>
    <div id="result" style="margin-top:16px"></div>
  </div>

  <p class="text-center text-sub" style="margin-top:20px">Belum punya pesanan? <a href="/topup" class="text-primary" style="font-weight:700">Top Up sekarang →</a></p>
</main>

<div id="siteFooter"></div>
<div id="chatWidget"></div>
<script src="/js/widget.js?v=3.0"></script>
<script src="/js/site.js?v=3.0"></script>
<script>
  const rupiah = (n) => "Rp" + Number(n).toLocaleString("id-ID");
  const STEPS = ["pending", "paid", "processing", "done"];
  const LABEL = { pending: "Menunggu Pembayaran", paid: "Pembayaran Diterima", processing: "Diproses", done: "Selesai", cancelled: "Dibatalkan" };
  const BADGE_CLS = { pending: "badge badge-pending", paid: "badge badge-paid", processing: "badge badge-processing", done: "badge badge-done", cancelled: "badge badge-cancelled" };
  const $ = (id) => document.getElementById(id);

  async function check() {
    const code = $("codeInput").value.trim().toUpperCase();
    const box = $("result");
    if (!code) { box.innerHTML = ""; return; }
    box.innerHTML = '<p class="text-center text-muted" style="padding:12px 0">Mencari…</p>';
    try {
      const res = await fetch("/api/track?code=" + encodeURIComponent(code));
      if (!res.ok) { box.innerHTML = '<div class="card text-center" style="background:var(--red-bg);color:var(--red);border-color:transparent">Pesanan tidak ditemukan. Periksa kembali kode invoicemu.</div>'; return; }
      const o = await res.json();
      const acc = Object.entries(o.account || {}).map(([k, v]) => `<div class="flex-between"><span>${k}</span><b>${v}</b></div>`).join("");
      const cancelled = o.status === "cancelled";
      const timeline = cancelled ? "" : `<div class="track-timeline">${STEPS.map((s, i) => {
        const done = STEPS.indexOf(o.status) >= i;
        return `<div class="track-step"><div class="track-dot ${done ? "done" : "pending"}"><span class="material-symbols-outlined" style="font-size:18px">${done ? "check" : "radio_button_unchecked"}</span></div><span class="text-muted" style="font-size:0.75rem;margin-top:4px;text-align:center">${LABEL[s]}</span></div>${i < STEPS.length - 1 ? `<div class="track-line ${STEPS.indexOf(o.status) > i ? "done" : "pending"}"></div>` : ""}`;
      }).join("")}</div>`;
      box.innerHTML = `
        <div class="card" style="margin-top:12px">
          <div class="flex-between" style="margin-bottom:12px"><b>${o.code}</b><span class="${BADGE_CLS[o.status] || "badge"}">${LABEL[o.status] || o.status}</span></div>
          ${timeline}
          <div class="flex-col gap-sm text-sub" style="font-size:0.95rem">
            <div class="flex-between"><span>Game</span><b style="color:var(--text)">${o.gameName}</b></div>
            <div class="flex-between"><span>Item</span><b style="color:var(--text)">${o.itemLabel}</b></div>
            ${acc}
            <div class="flex-between"><span>Metode</span><b style="color:var(--text)">${o.paymentMethod || "-"}</b></div>
            <div class="flex-between"><span>Total</span><b style="color:var(--secondary)">${rupiah(o.price)}</b></div>
            <div class="flex-between"><span>Tanggal</span><b style="color:var(--text)">${new Date(o.createdAt).toLocaleString("id-ID")}</b></div>
          </div>
        </div>`;
    } catch (e) { box.innerHTML = '<div class="card text-center" style="background:var(--red-bg);color:var(--red);border-color:transparent">Gagal terhubung. Coba lagi.</div>'; }
  }
  $("checkBtn").addEventListener("click", check);
  $("codeInput").addEventListener("keydown", (e) => { if (e.key === "Enter") check(); });
  const pre = new URLSearchParams(location.search).get("code");
  if (pre) { $("codeInput").value = pre; check(); }
  if (typeof initChatWidget === "function") initChatWidget();
</script>
</body>
</html>
