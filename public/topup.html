<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Up Game — anshelstore</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .games { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 14px; }
    .game-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; text-align: center; transition: .2s; }
    .game-card:hover, .game-card.sel { border-color: var(--brand); transform: translateY(-3px); }
    .game-emoji { font-size: 2rem; }
    .game-card h4 { margin-top: 8px; font-size: .98rem; }
    .game-card span { color: var(--muted); font-size: .8rem; }
    .items { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; margin-top: 8px; }
    .item { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: .2s; }
    .item:hover, .item.sel { border-color: var(--brand-2); }
    .item b { display: block; font-size: .95rem; }
    .item span { color: var(--brand-2); font-weight: 700; font-size: .9rem; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-top: 22px; }
    .invoice { background: var(--bg-alt); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-top: 16px; }
    .invoice .row { display: flex; justify-content: space-between; padding: 4px 0; color: var(--muted); }
    .invoice .row b { color: var(--text); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="/" class="brand"><span class="brand-dot"></span> anshelstore</a>
      <nav class="nav-links">
        <a href="/#layanan">Layanan</a>
        <a href="/topup.html" class="active">Top Up Game</a>
        <a href="/dashboard.html">Dashboard</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow">Top Up Game</span>
        <h2>Pilih game kamu</h2>
        <p>Proses cepat & aman. Pilih game, nominal, isi data akun, lalu pesan.</p>
      </div>

      <div class="games" id="games"></div>

      <div class="panel hidden" id="orderPanel">
        <h3 id="selGameName" style="margin-bottom:14px;"></h3>
        <label>Pilih Nominal</label>
        <div class="items" id="items"></div>

        <div id="accountFields"></div>

        <label>Nama Kamu</label>
        <input id="custName" type="text" placeholder="Nama lengkap" />
        <label>No. WhatsApp</label>
        <input id="custContact" type="text" placeholder="08xxxxxxxxxx" />

        <div style="margin-top:20px;">
          <button class="btn btn-block" id="submitOrder" disabled>Buat Pesanan</button>
        </div>

        <div class="invoice hidden" id="invoice"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><p>© <span id="year"></span> anshelstore</p></div>
  </footer>

  <div id="chatWidget"></div>
  <script src="/js/widget.js"></script>
  <script src="/js/topup.js"></script>
</body>
</html>
