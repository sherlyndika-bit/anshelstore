<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Chat — Anshel Store</title>
<link rel="icon" href="/logo.png?v=4" type="image/png"/>
<link rel="apple-touch-icon" href="/icon-192.png?v=4"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#e11d48','primary-hover':'#be123c',background:'#f8fafc',surface:'#ffffff'}}}}</script>
<script src="/js/theme.js?v=2.0"></script>
<link href="/css/theme.css?v=2.0" rel="stylesheet"/>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NXRVTQKMZF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-NXRVTQKMZF');
</script>
</head>
<body data-page="chat" class="bg-background text-gray-800 font-sans min-h-screen overflow-x-hidden selection:bg-pink-100 selection:text-primary">

<div id="siteNav"></div>

<main class="max-w-3xl mx-auto px-4 md:px-8 py-16 md:py-24 text-center">
  <div class="inline-flex items-center gap-2 bg-white rounded-full px-5 py-2.5 mb-8 shadow-sm border border-gray-200 mx-auto">
    <span class="relative flex h-3 w-3 mr-1">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
    </span>
    <span class="text-sm font-bold text-gray-700">Live Chat • online 24/7</span>
  </div>
  <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-6">Ngobrol dengan <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-rose-400">Anshel Store</span></h1>
  <p class="text-lg md:text-xl text-gray-500 max-w-2xl mx-auto leading-relaxed">
    Klik gelembung chat di kanan bawah. Coba ketik <b class="text-gray-700">"halo"</b>, <b class="text-gray-700">"top up"</b>, atau <b class="text-gray-700">"admin"</b> untuk melihat balasan AI. Saat agent mengambil alih, balasannya muncul real-time.
  </p>
  <div class="mt-12 flex flex-wrap gap-4 justify-center">
    <a href="/topup" class="bg-primary hover:bg-primary-hover text-white font-bold px-8 py-3.5 rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all">🎮 Top Up Game</a>
    <a href="/" class="bg-white text-primary font-bold px-8 py-3.5 rounded-xl border border-gray-200 hover:border-primary/30 hover:bg-pink-50 shadow-sm hover:shadow-md hover:scale-105 transition-all">&larr; Beranda</a>
  </div>
</main>

<div id="siteFooter"></div>
<div id="chatWidget"></div>
<script src="/js/widget.js"></script>
<script src="/js/site.js"></script>
<script>initChatWidget({ openByDefault: true, name: "Pengunjung Web" });</script>
</body>
</html>
