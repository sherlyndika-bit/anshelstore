<!DOCTYPE html>
<html class="light" lang="id">
<head>

<body class="bg-ambient text-on-background font-body-md min-h-screen overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">

<nav class="sticky top-0 w-full z-50 bg-surface/80 backdrop-blur-xl shadow-sm shadow-primary/10">

      <a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="/topup.html">Top Up Game</a>

    <span class="material-symbols-outlined text-secondary text-[16px]" style="font-variation-settings:'FILL' 1;">forum</span>

  </div>

<div id="chatWidget"></div>
<script src="/js/widget.js"></script>
<script>initChatWidget({ openByDefault: true, name: "Pengunjung Web" });</script>
