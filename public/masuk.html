<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Masuk / Daftar — Anshel Store</title>
<meta name="robots" content="noindex"/>
<meta name="theme-color" content="#6c5ce7"/>
<link href="/css/styles.css" rel="stylesheet"/>
<link href="/css/theme.css" rel="stylesheet"/>
<script src="/js/theme.js"></script>
</head>
<body data-page="masuk" class="min-h-screen">
<div id="siteNav"></div>

<main style="max-width:420px;margin:0 auto;padding:40px 16px 80px">
  <div class="card" style="padding:32px">
    <div class="text-center" style="margin-bottom:24px">
      <div class="brand-logo" style="width:56px;height:56px;border-radius:16px;font-size:24px;margin:0 auto 12px">a</div>
      <h1>Selamat Datang 👋</h1>
      <p class="text-sub" style="margin-top:4px">Masuk atau daftar untuk melihat riwayat pesananmu.</p>
    </div>

    <div class="auth-tabs" id="tabs">
      <button data-tab="login" class="active">Masuk</button>
      <button data-tab="register">Daftar</button>
      <button data-tab="otp">OTP</button>
    </div>

    <form id="paneLogin" class="flex-col gap-sm" style="display:flex">
      <input id="loginEmail" type="email" placeholder="Email" class="input"/>
      <input id="loginPass" type="password" placeholder="Password" class="input"/>
      <button class="btn btn-primary btn-block">Masuk</button>
    </form>
    <form id="paneRegister" class="flex-col gap-sm hidden">
      <input id="regName" type="text" placeholder="Nama" class="input"/>
      <input id="regEmail" type="email" placeholder="Email" class="input"/>
      <input id="regPass" type="password" placeholder="Password (min 6 karakter)" class="input"/>
      <button class="btn btn-primary btn-block">Daftar</button>
    </form>
    <form id="paneOtp" class="flex-col gap-sm hidden">
      <input id="otpEmail" type="email" placeholder="Email" class="input"/>
      <button type="button" id="sendOtp" class="btn btn-outline btn-block">Kirim Kode OTP</button>
      <div id="otpStep" class="flex-col gap-sm hidden">
        <input id="otpCode" type="text" inputmode="numeric" maxlength="6" placeholder="Kode 6 digit" class="input text-center mono" style="letter-spacing:0.3em;font-size:1.2rem"/>
        <button class="btn btn-primary btn-block">Verifikasi & Masuk</button>
      </div>
      <div id="devOtp" class="dev-otp hidden"></div>
    </form>

    <div id="googleWrap" class="hidden">
      <div class="divider">atau</div>
      <button id="googleBtn" class="btn-google">
        <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Lanjut dengan Google
      </button>
    </div>
    <div id="msg" class="auth-msg text-center"></div>
  </div>
</main>

<div id="siteFooter"></div>
<script src="/js/site.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const next = new URLSearchParams(location.search).get("next") || "/akun";
  // Sudah login? langsung ke tujuan
  const tok = localStorage.getItem("anshel_token");
  if (tok) fetch("/api/auth/me", { headers: { "x-auth-token": tok } }).then(r => { if (r.ok) location.replace(next); });
  if (location.hash.includes("token=")) { const t = new URLSearchParams(location.hash.slice(1)).get("token"); if (t) { localStorage.setItem("anshel_token", t); location.replace(next); } }

  const msg = (t, ok) => { const e = $("msg"); e.textContent = t; e.className = "auth-msg text-center " + (ok ? "ok" : "err"); };
  document.querySelectorAll("#tabs button").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll("#tabs button").forEach(x => { x.classList.remove("active"); });
    b.classList.add("active");
    document.querySelectorAll("#paneLogin,#paneRegister,#paneOtp").forEach(p => { p.classList.add("hidden"); p.style.display = ""; });
    const map = { login: "paneLogin", register: "paneRegister", otp: "paneOtp" };
    const el = $(map[b.dataset.tab]); el.classList.remove("hidden"); el.style.display = "flex";
  }));
  function done(d) { if (!d.token) return msg(d.error || "Gagal", false); localStorage.setItem("anshel_token", d.token); location.replace(next); }
  $("paneLogin").addEventListener("submit", async e => { e.preventDefault(); const r = await fetch("/api/auth/login", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ email:$("loginEmail").value.trim(), password:$("loginPass").value }) }); done(await r.json()); });
  $("paneRegister").addEventListener("submit", async e => { e.preventDefault(); const r = await fetch("/api/auth/register", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ name:$("regName").value.trim(), email:$("regEmail").value.trim(), password:$("regPass").value }) }); done(await r.json()); });
  $("sendOtp").addEventListener("click", async () => { const email=$("otpEmail").value.trim(); if(!email) return msg("Isi email dulu",false); const r=await fetch("/api/auth/otp/request",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})}); const d=await r.json(); if(!r.ok) return msg(d.error||"Gagal",false); $("otpStep").classList.remove("hidden"); $("otpStep").style.display="flex"; if(d.devCode){$("devOtp").classList.remove("hidden");$("devOtp").innerHTML="Mode dev: kode kamu <b>"+d.devCode+"</b>";} else msg("Kode terkirim ke email kamu.",true); });
  $("paneOtp").addEventListener("submit", async e => { e.preventDefault(); const r=await fetch("/api/auth/otp/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:$("otpEmail").value.trim(),code:$("otpCode").value.trim()})}); done(await r.json()); });
  $("googleBtn").addEventListener("click", () => location.href = "/api/auth/google?from=masuk");
  fetch("/api/auth/config").then(r=>r.json()).then(c=>{ if(c.google) $("googleWrap").classList.remove("hidden"); }).catch(()=>{});
</script>
</body>
</html>
