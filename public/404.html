<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Halaman Tidak Ditemukan - Anshel Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#e11d48', 'primary-hover': '#be123c', 'primary-light': '#ffe4e6' },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6 text-center">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 sm:p-12 relative overflow-hidden">
    <!-- Decorative background blobs -->
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-rose-100 rounded-full blur-3xl opacity-50"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-slate-100 rounded-full blur-3xl opacity-50"></div>
    
    <div class="relative z-10">
      <div class="w-24 h-24 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
        <span class="material-symbols-outlined text-5xl">explore_off</span>
      </div>
      
      <h1 class="text-7xl font-extrabold text-slate-900 mb-2 tracking-tight">404</h1>
      <h2 class="text-2xl font-bold text-slate-800 mb-4">Waduh, Kesasar Ya?</h2>
      
      <p class="text-slate-500 mb-8 leading-relaxed">
        Halaman yang Kakak cari tidak dapat ditemukan. Mungkin linknya salah, sudah dihapus, atau sedang bersembunyi.
      </p>
      
      <a href="/" class="inline-flex items-center justify-center w-full gap-2 bg-primary hover:bg-primary-hover text-white font-bold py-4 px-6 rounded-xl transition-all hover:-translate-y-0.5 shadow-md hover:shadow-lg">
        <span class="material-symbols-outlined text-lg">home</span>
        Kembali ke Beranda
      </a>
      
      <div class="mt-6 pt-6 border-t border-slate-100 text-sm text-slate-500">
        Butuh bantuan? <a href="/kontak" class="text-primary font-semibold hover:underline">Hubungi Kami</a>
      </div>
    </div>
  </div>
</body>
</html>
