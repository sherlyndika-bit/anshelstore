<script>
  const FAQ = [
    { q: "Apakah top up di Anshel Store aman?", a: "Sangat aman. Kami <b>tidak pernah meminta password</b> akunmu — cukup User ID dan Server/Zone ID. Data kamu dijaga kerahasiaannya." },
    { q: "Berapa lama proses top up?", a: "Mayoritas pesanan diproses <b>instan</b> dalam hitungan menit setelah pembayaran dikonfirmasi. Jika ramai, maksimal beberapa puluh menit." },
    { q: "Metode pembayaran apa saja yang tersedia?", a: "E-Wallet (DANA, OVO, GoPay, ShopeePay), <b>QRIS</b>, dan Transfer Bank (BCA, Mandiri, BRI, BNI)." },
    { q: "Bagaimana cara melacak pesanan saya?", a: "Gunakan halaman <a href='/cek-transaksi' class='text-primary font-bold hover:underline'>Cek Transaksi</a> dan masukkan kode invoice yang kamu terima saat memesan." },
    { q: "Apa itu jasa AI Chatbot Anshel Store?", a: "Layanan pembuatan <b>chatbot AI 24/7</b> lengkap dengan dashboard inbox dan fitur <b>human takeover</b> agar agent bisa mengambil alih percakapan kapan saja." },
    { q: "Apakah harga bisa berubah?", a: "Harga dapat menyesuaikan kebijakan publisher game. Harga yang berlaku adalah yang tampil saat kamu melakukan pemesanan." },
  ];
  const list = document.getElementById("faqList");
  list.innerHTML = FAQ.map((f, i) => `
    <div class="bg-surface rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all">
      <button class="faq-q w-full flex items-center justify-between gap-4 p-6 text-left focus:outline-none focus:bg-gray-50 transition-colors" data-i="${i}">
        <span class="font-bold text-gray-900 text-[17px]">${f.q}</span>
        <svg class="w-6 h-6 text-primary transition-transform faq-icon shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </button>
      <div class="faq-a hidden px-6 pb-6 pt-1 text-gray-600 border-t border-gray-50 leading-relaxed">${f.a}</div>
    </div>`).join("");
  list.querySelectorAll(".faq-q").forEach((btn) => btn.addEventListener("click", () => {
    const a = btn.nextElementSibling, ic = btn.querySelector(".faq-icon");
    const open = !a.classList.contains("hidden");
    a.classList.toggle("hidden", open); ic.style.transform = open ? "" : "rotate(180deg)";
  }));
  fetch("/api/settings").then((r) => r.json()).then((d) => { if (d.store && d.store.whatsapp) document.getElementById("faqWa").href = `https://wa.me/${d.store.whatsapp}?text=${encodeURIComponent("Halo Anshel Store, saya mau bertanya.")}`; }).catch(() => {});
  if (typeof initChatWidget === "function") initChatWidget();
</script>
