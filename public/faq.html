<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FAQ — Pertanyaan Umum | Anshel Store</title>
<meta name="description" content="Pertanyaan yang sering diajukan seputar top up game, jasa AI automation, pembayaran, dan keamanan di Anshel Store." />
<meta name="theme-color" content="#6c5ce7"/>
<link href="/css/styles.css?v=5.0" rel="stylesheet"/>
<link href="/css/theme.css?v=5.0" rel="stylesheet"/>
<script src="/js/theme.js?v=5.0"></script>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[
{"@type":"Question","name":"Apakah top up di Anshel Store aman?","acceptedAnswer":{"@type":"Answer","text":"Sangat aman. Kami hanya meminta User ID dan Server/Zone ID, tidak pernah meminta password akunmu."}},
{"@type":"Question","name":"Berapa lama proses top up?","acceptedAnswer":{"@type":"Answer","text":"Mayoritas pesanan diproses instan dalam hitungan menit setelah pembayaran dikonfirmasi."}},
{"@type":"Question","name":"Metode pembayaran apa saja yang tersedia?","acceptedAnswer":{"@type":"Answer","text":"E-Wallet (DANA, OVO, GoPay, ShopeePay), QRIS, dan Transfer Bank (BCA, Mandiri, BRI, BNI)."}},
{"@type":"Question","name":"Apa itu jasa AI Chatbot Anshel Store?","acceptedAnswer":{"@type":"Answer","text":"Layanan pembuatan chatbot AI 24/7 lengkap dengan dashboard dan fitur human takeover agar agent bisa mengambil alih percakapan kapan saja."}}
]}
</script>
</head>
<body data-page="faq" class="min-h-screen">

<div id="siteNav"></div>

<main class="container" style="padding:48px 16px 80px">
  <div class="section-head">
    <h1 style="font-size:clamp(2rem,4vw,2.8rem)">Pertanyaan <span class="text-gradient">Umum</span></h1>
    <p>Semua yang perlu kamu tahu tentang Anshel Store.</p>
  </div>

  <div class="container-md" style="margin-bottom:48px">
    <div class="flex-col gap-sm" id="faqList"></div>
  </div>

  <div class="container-md">
    <div class="cta-band">
      <h2>Masih ada pertanyaan?</h2>
      <p>Tim kami siap membantu kamu.</p>
      <a id="faqWa" href="/tentang" target="_blank" rel="noopener" class="btn btn-outline">💬 Chat WhatsApp</a>
    </div>
  </div>
</main>

<div id="siteFooter"></div>
<div id="chatWidget"></div>
<script src="/js/widget.js?v=5.0"></script>
<script src="/js/site.js?v=5.0"></script>
<script>
  const FAQ = [
    { q: "Apakah top up di Anshel Store aman?", a: "Sangat aman. Kami <b>tidak pernah meminta password</b> akunmu — cukup User ID dan Server/Zone ID. Data kamu dijaga kerahasiaannya." },
    { q: "Berapa lama proses top up?", a: "Mayoritas pesanan diproses <b>instan</b> dalam hitungan menit setelah pembayaran dikonfirmasi. Jika ramai, maksimal beberapa puluh menit." },
    { q: "Metode pembayaran apa saja yang tersedia?", a: "E-Wallet (DANA, OVO, GoPay, ShopeePay), <b>QRIS</b>, dan Transfer Bank (BCA, Mandiri, BRI, BNI)." },
    { q: "Bagaimana cara melacak pesanan saya?", a: "Gunakan halaman <a href='/cek-transaksi' class='text-primary' style='font-weight:700'>Cek Transaksi</a> dan masukkan kode invoice yang kamu terima saat memesan." },
    { q: "Apa itu jasa AI Chatbot Anshel Store?", a: "Layanan pembuatan <b>chatbot AI 24/7</b> lengkap dengan dashboard inbox dan fitur <b>human takeover</b> agar agent bisa mengambil alih percakapan kapan saja." },
    { q: "Apakah harga bisa berubah?", a: "Harga dapat menyesuaikan kebijakan publisher game. Harga yang berlaku adalah yang tampil saat kamu melakukan pemesanan." },
  ];
  const list = document.getElementById("faqList");
  list.innerHTML = FAQ.map((f, i) => `
    <div class="faq-item">
      <button class="faq-q" data-i="${i}">
        <span style="font-weight:700;font-size:1rem">${f.q}</span>
        <span class="material-symbols-outlined faq-icon">expand_more</span>
      </button>
      <div class="faq-a hidden">${f.a}</div>
    </div>`).join("");
  list.querySelectorAll(".faq-q").forEach((btn) => btn.addEventListener("click", () => {
    const a = btn.nextElementSibling, ic = btn.querySelector(".faq-icon");
    const open = !a.classList.contains("hidden");
    a.classList.toggle("hidden", open); ic.style.transform = open ? "" : "rotate(180deg)";
  }));
  fetch("/api/settings").then((r) => r.json()).then((d) => { if (d.store && d.store.whatsapp) document.getElementById("faqWa").href = `https://wa.me/${d.store.whatsapp}?text=${encodeURIComponent("Halo Anshel Store, saya mau bertanya.")}`; }).catch(() => {});
  if (typeof initChatWidget === "function") initChatWidget();
</script>
</body>
</html>
